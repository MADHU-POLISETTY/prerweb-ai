<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#050505"/>
  
  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow-grad)" stroke-width="8" opacity="0.15" />
  
  <defs>
    <!-- Gradient definition -->
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Connected Neural Grid Lines -->
    <path d="M 176,216 L 256,156 L 336,216 L 336,296 L 256,356 L 176,296 Z" fill="none" stroke="url(#brain-grad)" stroke-width="4" stroke-linejoin="round" opacity="0.3" />
    <path d="M 176,216 L 256,296 L 336,216" fill="none" stroke="url(#brain-grad)" stroke-width="3" opacity="0.25" />
    <path d="M 176,296 L 256,216 L 336,296" fill="none" stroke="url(#brain-grad)" stroke-width="3" opacity="0.25" />
    <path d="M 256,156 L 256,356" fill="none" stroke="url(#brain-grad)" stroke-width="3" opacity="0.2" />
    
    <!-- Outer brain outline (symmetric stylization) -->
    <path d="M 136,256 
             C 116,216 116,166 176,146 
             C 216,136 236,156 256,166 
             C 276,156 296,136 336,146 
             C 396,166 396,216 376,256 
             C 396,296 396,346 336,366 
             C 296,376 276,356 256,346 
             C 236,356 216,376 176,366 
             C 116,346 116,296 136,256 Z" 
          fill="none" 
          stroke="url(#brain-grad)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <!-- Neural Nodes (Synaptic junctions) -->
    <circle cx="256" cy="156" r="7" fill="#ffffff" />
    <circle cx="176" cy="216" r="7" fill="#3b82f6" />
    <circle cx="336" cy="216" r="7" fill="#ec4899" />
    <circle cx="256" cy="216" r="9" fill="#ffffff" />
    <circle cx="256" cy="296" r="9" fill="#ffffff" />
    <circle cx="176" cy="296" r="7" fill="#3b82f6" />
    <circle cx="336" cy="296" r="7" fill="#ec4899" />
    <circle cx="256" cy="356" r="7" fill="#ffffff" />
    
    <circle cx="136" cy="256" r="5" fill="#3b82f6" opacity="0.8" />
    <circle cx="376" cy="256" r="5" fill="#ec4899" opacity="0.8" />
  </g>
</svg>
