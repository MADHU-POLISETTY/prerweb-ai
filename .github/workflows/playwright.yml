name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Run Tests in Parallel Shards
  test:
    name: Run Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Splits the 300 tests into 5 parallel machines. 
        # You can increase this to 10 if you need it to be even faster.
        shardIndex: [1, 2, 3, 4, 5]
        shardTotal: [5]
    
    steps:
    - uses: actions/checkout@v4
    
    # Updated to v4 to resolve the Node.js deprecation warning in your screenshot
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      # This flag tells Playwright to only run a specific fraction of the tests on this machine
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

    - name: Upload blob report to GitHub Actions Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
