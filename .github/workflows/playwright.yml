name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Splits the 300 tests into 5 parallel machines
        shardIndex: [1, 2, 3, 4, 5]
        shardTotal: [5]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright & System Dependencies
        run: npx playwright install --with-deps

      - name: Setup Virtual Display (Xvfb for Headless Browsers)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run E2E Test Suite
        env:
          # Pass required CI environment configurations & secrets
          CI: true
          HEADLESS: true
          CHROME_BIN: /usr/bin/google-chrome
          # Ensures SEC-02 credential checks pass securely in CI
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET || 'ci-dummy-secure-key' }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 30
