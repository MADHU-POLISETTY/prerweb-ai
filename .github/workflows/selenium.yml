name: Comprehensive E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Parallel test runs using a matrix strategy to group them visually under one node in the workflow UI
  run-tests:
    name: ${{ matrix.job.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job:
          - name: "Selenium - Website Testing"
            engine: "selenium"
            setup-node: true
          - name: "Appium - Android Tests"
            engine: "appium"
            setup-node: false
          - name: "Unit Tests - API (300)"
            engine: "unit"
            setup-node: true
          - name: "Validation Tests (300)"
            engine: "validation"
            setup-node: true
          - name: "Deployment Status (300)"
            engine: "deployment"
            setup-node: false
          - name: "Load Testing - Performance"
            engine: "load"
            setup-node: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      if: ${{ matrix.job.setup-node }}
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node & Python Dependencies
      if: ${{ matrix.job.setup-node }}
      run: |
        npm ci || npm install
        pip install -r requirements.txt

    - name: Install Python Dependencies
      if: ${{ !matrix.job.setup-node }}
      run: |
        pip install -r requirements.txt

    - name: Run Test Engine
      run: |
        python comprehensive_test_runner.py --engine ${{ matrix.job.engine }}

    - name: Upload JSON results
      uses: actions/upload-artifact@v4
      with:
        name: results_${{ matrix.job.engine }}
        path: results_${{ matrix.job.engine }}.json
        retention-days: 1

  # 7. Consolidation and master report compilation job
  compile-report:
    name: Compile Master Report (300)
    runs-on: ubuntu-latest
    needs: [run-tests]
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install openpyxl

    - name: Download JSON results from upstream jobs
      uses: actions/download-artifact@v4
      with:
        pattern: results_*
        merge-multiple: true

    - name: Compile Consolidated Master Report
      run: |
        python comprehensive_test_runner.py --compile

    - name: Upload Master Excel Test Report
      uses: actions/upload-artifact@v4
      with:
        name: comprehensive-e2e-excel-report
        path: Comprehensive_E2E_Report_PrepWise_AI_*.xlsx
        retention-days: 30
