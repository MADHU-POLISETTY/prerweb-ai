name: prepwise_ai
description: A premium Flutter mobile-first application for AI-powered career coaching, smart technical & leadership mock interviews, and detailed ATS resume optimization.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  file_picker: ^8.0.0
  record: ^5.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
